<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagem enviada | P.S. Junior</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f5f1eb; --ink:#171310; --muted:#6f655b; --accent:#8d2b2b; --sans:'Inter',sans-serif; --serif:'Playfair Display',serif; --body:'Cormorant Garamond',serif; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--ink); padding:2rem; }
    .card { max-width:700px; text-align:center; padding:3rem; border:1px solid rgba(23,19,16,.1); background:rgba(255,255,255,.6); box-shadow:0 20px 60px rgba(23,19,16,.08); }
    h1 { font-family:var(--serif); font-size:clamp(2.4rem,5vw,4rem); line-height:1.05; margin-bottom:1rem; }
    p { font-family:var(--body); font-size:1.35rem; color:var(--muted); line-height:1.7; margin-bottom:1.5rem; }
    a { display:inline-block; text-decoration:none; background:var(--ink); color:#fff; padding:1rem 1.6rem; font-family:var(--sans); font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; }
    a:hover { background:var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mensagem enviada</h1>
    <p>Obrigado pelo contato. Sua mensagem foi enviada com sucesso e poderá ser recebida pelo painel de formulários da Netlify e pelas notificações por e-mail que você ativar no site.</p>
    <a href="/">Voltar ao site</a>
  </div>
</body>
</html>
